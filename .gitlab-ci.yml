# Refresh dashboard data daily and commit so GitLab Pages serves updated JSON/charts.
stages:
  - build
  - deploy

variables:
  TZ: America/New_York

build:
  stage: build
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - python scripts/build_data.py --out-dir data
  artifacts:
    paths:
      - data/
    expire_in: 1 day

pages:
  stage: deploy
  image: alpine:latest
  script:
    # GitLab Pages 只发布 public 目录，把站点文件放进 public/
    - mkdir -p public
    - cp index.html public/
    - cp -r data public/
  artifacts:
    paths:
      - public
  dependencies:
    - build
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
