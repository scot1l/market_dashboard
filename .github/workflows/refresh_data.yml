# Refresh dashboard data and commit changed JSON/charts for GitHub Pages.
name: Refresh dashboard data

on:
  schedule:
    # GitHub cron is UTC. Poll at 15:30, 16:30, 17:30, and 18:30 Asia/Shanghai on weekdays.
    - cron: '30 7-10 * * 1-5'
  workflow_dispatch: # Allow manual run

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate data
        run: |
          python scripts/build_data.py --out-dir data
        env:
          TZ: Asia/Shanghai

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: refresh dashboard data [automated]" && git push)
